<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Interest Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      text-align: center;
      color: green;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h2>Simple Interest Calculator</h2>

    <input type="number" id="principal" placeholder="Enter Principal Amount">
    <input type="number" id="rate" placeholder="Enter Rate of Interest">
    <input type="number" id="time" placeholder="Enter Time (Years)">

    <button onclick="calculateSI()">Calculate</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculateSI() {
      let principal = document.getElementById("principal").value;
      let rate = document.getElementById("rate").value;
      let time = document.getElementById("time").value;

      let si = (principal * rate * time) / 100;

      document.getElementById("result").innerHTML =
        "Simple Interest = " + si;
    }
  </script>

</body>
</html>
